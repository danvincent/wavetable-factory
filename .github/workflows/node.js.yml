name: Node.js CI

on:
  push:
    branches:
      - cicd

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@<SHA_FOR_ACTIONS_CHECKOUT>
      - name: Setup Node.js
        uses: actions/setup-node@<SHA_FOR_ACTIONS_SETUP_NODE>
        with:
          node-version: '14'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test