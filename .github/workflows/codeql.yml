name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '19 3 * * 0'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (JavaScript)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@b13c3f8a6e7ebf8243610414580d94812085a032 # v3.29.0
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@b13c3f8a6e7ebf8243610414580d94812085a032 # v3.29.0

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@b13c3f8a6e7ebf8243610414580d94812085a032 # v3.29.0
